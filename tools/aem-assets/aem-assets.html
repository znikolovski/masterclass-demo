<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta name="da-org" content="znikolovski" />
    <meta name="da-site" content="masterclass-demo" />
    <title>AEM Assets</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        font-family: adobe-clean, 'Source Sans Pro', sans-serif;
      }

      .aem-assets-status {
        margin: 0;
        padding: 8px 12px;
        font-size: 12px;
        line-height: 1.4;
        background: #f5f5f5;
        border-bottom: 1px solid #e1e1e1;
        color: #444;
      }

      .aem-assets-status[hidden] {
        display: none;
      }

      .aem-assets-status.is-error {
        background: #fff5f5;
        color: #8b0000;
      }

      #aem-assets-frame {
        flex: 1;
        border: 0;
        width: 100%;
        min-height: 0;
      }

      .aem-assets-debug {
        margin: 0;
        padding: 8px 12px;
        font: 11px/1.4 ui-monospace, monospace;
        background: #1e1e1e;
        color: #d4d4d4;
        border-bottom: 1px solid #333;
        max-height: 40vh;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .aem-assets-debug[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <script type="application/json" id="aem-assets-bootstrap">
      {"repositoryId":"author-p115476-e1135027.adobeaemcloud.com","codeOrigin":"https://main--masterclass-demo--znikolovski.aem.page"}
    </script>
    <p class="aem-assets-status" id="aem-assets-status" hidden></p>
    <pre class="aem-assets-debug" id="aem-assets-debug" hidden></pre>
    <!-- src set in HTML so the picker loads even if module JS is delayed or blocked -->
    <iframe
      id="aem-assets-frame"
      title="AEM Assets"
      src="https://experience.adobe.com/solutions/CQ-helix-assets-addon/static-assets/resources/asset-selector.html?rail=true&amp;aem.repositoryId=author-p115476-e1135027.adobeaemcloud.com&amp;extConfigUrl=https%3A%2F%2Fmain--masterclass-demo--znikolovski.aem.page%2Ftools%2Fassets-selector%2Fconfig.json"
    ></iframe>
    <script type="module" src="./aem-assets.js"></script>
  </body>
</html>
