<meta
  http-equiv="Content-Security-Policy"
  content="script-src 'nonce-aem' 'strict-dynamic' 'unsafe-inline' http: https:; base-uri 'self'; object-src 'none';"
  move-to-http-header="true"
>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style nonce="aem">
/* Critical tokens — keep in sync with styles/brand.css */
:root {
  --heading-font-family: "Syncopate", sans-serif;
  --body-font-family: "Instrument Sans", sans-serif;
  --background-color: #fff;
  --text-color: #0f1a14;
  --accent-color: #e8651a;
  --light-color: #f4f2ef;
  --dark-color: #0f1a14;
  --heading-font-size-xxl: 56px;
  --body-font-size-m: 20px;
  --nav-height: 64px;
}

body {
  display: none;
  margin: 0;
  background-color: var(--background-color);
  color: var(--text-color);
}

body.appear {
  display: block;
}

header {
  min-height: var(--nav-height);
}

/* LCP hero shell — keep in sync with styles/styles.css and blocks/hero-adventure/hero-adventure.css */
.hero-adventure-wrapper {
  max-width: 100% !important;
  padding: 0 !important;
}

.hero-adventure {
  position: relative;
  display: flex;
  align-items: center;
  min-height: 55vh;
  overflow: hidden;
  padding: 0;
}

.hero-adventure > div:first-child,
.hero-adventure > div:first-child > div,
.hero-adventure > div:first-child picture {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.hero-adventure > div:first-child img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-adventure::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgb(0 0 0 / 45%) 0%, rgb(0 0 0 / 15%) 100%);
  z-index: 1;
  pointer-events: none;
}

.hero-adventure > div:last-child {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
  color: #fff;
  text-shadow: 0 1px 3px rgb(0 0 0 / 35%);
}

.hero-adventure > div:last-child > div:has(> h1) {
  min-height: calc(var(--heading-font-size-xxl) * 1.1 * 4 + 40px);
}

.hero-adventure h1 {
  font-size: var(--heading-font-size-xxl);
  font-weight: 700;
  font-family: var(--heading-font-family);
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: #fff;
  margin: 16px 0 24px;
  max-width: 52rem;
  visibility: hidden;
}

.hero-adventure h1.hero-heading-ready {
  visibility: visible;
}

main .section.hero-adventure-container,
main .section.lcp-section {
  max-width: 100%;
  margin: 0;
  padding: 0;
}

main .section.hero-adventure-container > div,
main .section.lcp-section > div {
  max-width: 100%;
  margin: 0;
  padding: 0;
}

main .section.lcp-section .fragment:not([data-block-status="loaded"]) {
  display: none;
  min-height: 0;
}

main .section.lcp-section.target:not(.target-ready),
main .section.target:not(.target-ready) {
  visibility: visible;
}
</style>
<script nonce="aem">
(function (doc) {
  /* Keep in sync with buildHeroAdventureLcpUrls() in scripts/media.js */
  var HERO_LCP_MAX = 1600;
  var HERO_LCP_MIN = 640;
  function isDynamicMediaUrl(url) {
    return /\/adobe\/assets\/|\/is\/(image|content)\//.test(url.pathname)
      || /\.adobeaemcloud\.com$|scene7\.com$|adobedc\.net$/i.test(url.hostname);
  }
  function getHeroLcpWidth() {
    var vw = window.innerWidth || 412;
    var dpr = window.devicePixelRatio || 1;
    var needed = Math.ceil(vw * dpr);
    return Math.min(HERO_LCP_MAX, Math.max(HERO_LCP_MIN, needed));
  }
  function getHeroBaseSrc(src, baseUri) {
    var url = new URL(src, baseUri || window.location.href);
    if (isDynamicMediaUrl(url)) {
      if (url.pathname.indexOf('/adobe/assets/') !== -1) {
        ['width', 'format', 'height', 'preferwebp'].forEach(function (p) { url.searchParams.delete(p); });
      } else {
        ['wid', 'qlt', 'fmt', 'hei', 't'].forEach(function (p) { url.searchParams.delete(p); });
      }
    } else {
      ['width', 'format', 'optimize', 'height'].forEach(function (p) { url.searchParams.delete(p); });
    }
    return url.toString();
  }
  function buildHeroLcpUrl(src, baseUri) {
    var base = getHeroBaseSrc(src, baseUri);
    var url = new URL(base, baseUri || window.location.href);
    var width = getHeroLcpWidth();
    if (isDynamicMediaUrl(url)) {
      if (url.pathname.indexOf('/adobe/assets/') !== -1) {
        url.searchParams.set('width', String(width));
        url.searchParams.set('format', 'webp');
        return { preloadHref: url.toString(), heroBaseSrc: base };
      }
      url.searchParams.set('wid', String(width));
      url.searchParams.set('qlt', '85');
      url.searchParams.set('fmt', 'webp');
      return { preloadHref: url.toString(), heroBaseSrc: base };
    }
    return {
      preloadHref: url.origin + url.pathname + '?width=' + width + '&format=webply&optimize=medium',
      heroBaseSrc: base,
    };
  }
  function revealHeroHeading() {
    var h1 = doc.querySelector('.hero-adventure h1, .hero h1');
    if (!h1 || h1.classList.contains('hero-heading-ready')) return;
    var show = function () { h1.classList.add('hero-heading-ready'); };
    if (doc.fonts && doc.fonts.load) {
      doc.fonts.load('700 56px Syncopate').then(show).catch(show);
      setTimeout(show, 2500);
    } else {
      show();
    }
  }
  function upgradeHeroImg(img) {
    if (!img || img.dataset.lcpPrimed) return true;
    try {
      var picture = img.closest('picture');
      if (picture) {
        picture.querySelectorAll('source').forEach(function (source) { source.remove(); });
      }
      var urls = buildHeroLcpUrl(img.getAttribute('src') || img.src, doc.baseURI);
      img.dataset.lcpPrimed = 'true';
      img.dataset.mediaOptimized = 'true';
      img.dataset.heroBaseSrc = urls.heroBaseSrc;
      img.setAttribute('loading', 'eager');
      img.setAttribute('fetchpriority', 'high');
      img.setAttribute('decoding', 'async');
      img.setAttribute('sizes', '100vw');
      img.src = urls.preloadHref;
      if (doc.body) doc.body.classList.add('appear');
      revealHeroHeading();
    } catch (e) {
      img.dataset.lcpPrimed = 'true';
      img.setAttribute('loading', 'eager');
      img.setAttribute('fetchpriority', 'high');
      img.setAttribute('decoding', 'async');
      if (doc.body) doc.body.classList.add('appear');
      revealHeroHeading();
    }
    return true;
  }
  function findHeroImg() {
    return doc.querySelector('.hero-adventure > div:first-child picture img, .hero-adventure picture img');
  }
  function watchHeroImg() {
    var img = findHeroImg();
    if (img) return upgradeHeroImg(img);
    return false;
  }
  var og = doc.querySelector('meta[property="og:image"]');
  if (og && og.content) {
    try {
      var urls = buildHeroLcpUrl(og.content, doc.baseURI);
      var preloadImg = doc.createElement('link');
      preloadImg.rel = 'preload';
      preloadImg.as = 'image';
      preloadImg.href = urls.preloadHref;
      preloadImg.setAttribute('fetchpriority', 'high');
      doc.head.appendChild(preloadImg);
    } catch (e) { /* ignore invalid og:image */ }
  }
  if (!watchHeroImg()) {
    var obs = new MutationObserver(function () {
      if (watchHeroImg()) obs.disconnect();
    });
    obs.observe(doc.documentElement, { childList: true, subtree: true });
    doc.addEventListener('DOMContentLoaded', function () {
      obs.disconnect();
      watchHeroImg();
      if (doc.body) doc.body.classList.add('appear');
    }, { once: true });
  }
})(document);
</script>
