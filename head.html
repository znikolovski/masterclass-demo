<meta
  http-equiv="Content-Security-Policy"
  content="script-src 'nonce-aem' 'strict-dynamic' 'unsafe-inline' http: https:; base-uri 'self'; object-src 'none';"
  move-to-http-header="true"
>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<script nonce="aem">
(function (doc) {
  var og = doc.querySelector('meta[property="og:image"]');
  if (og && og.content) {
    try {
      var imgUrl = new URL(og.content, doc.baseURI || window.location.href);
      var path = imgUrl.origin + imgUrl.pathname;
      var mobile = path + '?width=750&format=webply&optimize=medium';
      var desktop = path + '?width=1200&format=webply&optimize=medium';
      var preloadImg = doc.createElement('link');
      preloadImg.rel = 'preload';
      preloadImg.as = 'image';
      preloadImg.href = mobile;
      preloadImg.setAttribute('imagesrcset', desktop + ' 1200w, ' + mobile + ' 750w');
      preloadImg.setAttribute('imagesizes', '100vw');
      doc.head.appendChild(preloadImg);
    } catch (e) { /* ignore invalid og:image */ }
  }
  var tpl = doc.querySelector('meta[name="template"]');
  if (tpl && /^(homepage|landing-page)$/.test(tpl.content.trim())) {
    var heroStyle = doc.createElement('link');
    heroStyle.rel = 'stylesheet';
    heroStyle.href = '/blocks/hero-adventure/hero-adventure.css';
    doc.head.appendChild(heroStyle);
  }
})(document);
</script>
<script nonce="aem" src="/scripts/aem.js" type="module"></script>
<script nonce="aem" src="/scripts/scripts.js" type="module"></script>
<link rel="stylesheet" href="/styles/brand.css"/>
<link rel="stylesheet" href="/styles/styles.css"/>
<link rel="preconnect" href="https://edge.adobedc.net"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/syncopate/v24/pe0pMIuPIYBCpEV5eFdKvtKqCv5vS1U.woff2"/>
